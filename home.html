<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/all.min.css" />
        <link rel="stylesheet" href="css/home.css" />
        <title>Sadeed | سديد</title>
    </head>
    <body>
        <div class="container">
            <!-- Start Header -->
            <header>
                <div class="logo">
                    <div><img src="img/cute-clock.svg" /></div>
                    <div><img src="img/cute-green-check-mark-icon.svg" /></div>
                    <div><img src="img/cute-yellow-folder.svg" /></div>
                </div>
                <div class="setting"><i class="fa-solid fa-gear"></i></div>
            </header>
            <!-- End Header -->
            <!-- Start Welcome -->
            <div class="welcome">
                <h1>مرحبا... <span>أواب</span></h1>
            </div>
            <!-- End Welcome -->
            <!-- Start Cards -->
            <div class="cards">
                <div class="card">
                    <div class="image">
                        <img src="img/cute-clock.svg" />
                    </div>
                    <div class="text">
                        <h2>مرتب الأولويات</h2>
                        <a href="#">
                            <button>
                                <i class="fa-solid fa-chevron-left"></i>
                                أبدأ
                            </button>
                        </a>
                    </div>
                </div>
                <div class="card">
                    <div class="image">
                        <img src="img/cute-green-check-mark-icon.svg" />
                    </div>
                    <div class="text">
                        <h2>قائمة المهام</h2>
                        <a href="#">
                            <button>
                                <i class="fa-solid fa-chevron-left"></i>
                                أبدأ
                            </button>
                        </a>
                    </div>
                </div>
                <div class="card">
                    <div class="image">
                        <img src="img/cute-yellow-folder.svg" />
                    </div>
                    <div class="text">
                        <h2>قائمة الملاحظات</h2>
                        <a href="#">
                            <button>
                                <i class="fa-solid fa-chevron-left"></i>
                                أبدأ
                            </button>
                        </a>
                    </div>
                </div>
            </div>
            <!-- End Cards -->
        </div>
    </body>
</html>
