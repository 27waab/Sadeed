<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/all.min.css" />
        <link rel="stylesheet" href="noots.css" />
        <title>سديد | مستودع الملاحظات</title>
    </head>
    <body>
        <!-- Start Header -->
        <header>
            <div class="container">
                <div class="logo">
                    سديد
                </div>
                <div class="setting">
                    <i class="fa-solid fa-gear"></i>
                </div>
            </div>
        </header>
        <!-- End Header -->
        <!-- Start Welcome -->
        <div class="welcome">
            <div class="container">
                <div>
                    <div class="avatar">
                        <img src="../img/cute-yellow-folder.svg" />
                    </div>
                    <h1>مستودع الملاحظات</h1>
                </div>
                <p>سجل ملاحظاتك بكل يسر وسهولة وعد لها في أي وقت وصنفها على مزاجك</p>
            </div>
        </div>
        <!-- End Welcome -->
        <!-- Start Noots -->
        <div class="noots">
            <div class="container">
                <div class="noot-item" style="background-color: #9c27b0;">
                    <h3>أهدافي</h3>
                </div>
                <div class="noot-item" style="background-color: #2196f3;">
                    <h3>موادي الدراسية</h3>
                </div>
                <div class="noot-item" style="background-color: #4caf50;">
                    <h3>حكم عربية</h3>
                </div>
                <div class="noot-item" style="background-color: #607d8b;">
                    <h3>بودكاست يجب أن أسمعه</h3>
                </div>
                <div class="noot-item" style="background-color: #ff2525;">
                    <h3>قائمة المدن التي أود زيارتها</h3>
                </div>
            </div>
        </div>
        <!-- End Noots -->
        <!-- Start Add Noots -->
        <div class="add-noot">
            ملاحظة جديدة
            <i class="fa-solid fa-plus"></i>
        </div>
        <!-- End Add Noots -->
    </body>
</html>
