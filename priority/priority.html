<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/all.min.css" />
        <link rel="stylesheet" href="priority.css" />
        <title>سديد | مرتب الأولويات</title>
    </head>
    <body>
        <div class="ovarlay"></div>
        <!-- Start Header -->
        <header>
            <div class="container">
                <div class="logo">
                    سديد
                </div>
                <div class="setting">
                    <i class="fa-solid fa-gear"></i>
                </div>
            </div>
        </header>
        <!-- End Header -->
        <!-- Start Welcome -->
        <div class="welcome">
            <div class="container">
                <div>
                    <div class="avatar">
                        <img src="../img/cute-clock.svg" />
                    </div>
                    <h1>مرتب الأولويات</h1>
                </div>
                <p>هل مهامك في حالة فوضى؟ مرتب الأولويات سيجعلها تسير في طابور منظم، لتنجز كل شيء بسهولة! وداعًا للتشتت، ومرحباً بالتركيز والإنجاز. دع مهامك تتراصف كقطع البازل، وتتألق كأوركسترا متناغمة، لتستمتع بإتمامها ببراعة</p>
            </div>
        </div>
        <!-- End Welcome -->
        <!-- Start Priority -->
        <div class="priority">
            <div class="container">
                <div class="add">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </div>
        </div>
        <!-- End Priority -->
        <!-- Start Add Priority -->
        <div class="add-section">
            <div class="header">
                <div class="logo">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <h3>إضافة مهمة</h3>
            </div>
            <form action="">
                <div class="name">
                    <label for="name">إسم المهمة</label>
                    <input type="text" id="name" />
                </div>
                <div class="degre">
                    <div class="r">
                        <label for="r">الرغبة</label>
                        <div>
                            <input type="number" name="r" id="r" maxlength="1" max="5" />
                            <p>/5</p>
                        </div>
                    </div>
                    <div class="q">
                        <label for="q">القدرة</label>
                        <div>
                            <input type="number" name="q" id="q" maxlength="1" max="5" />
                            <p>/5</p>
                        </div>
                    </div>
                    <div class="w">
                        <label for="w">الوقت</label>
                        <div>
                            <input type="number" name="w" id="w" maxlength="1" max="5" />
                            <p>/5</p>
                        </div>
                    </div>
                </div>
            </form>
            <button>أضف المهمة</button>
        </div>
        <!-- End Add Priority -->
        <script src="priority.js"></script>
    </body>
</html>
