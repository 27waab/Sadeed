<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/all.min.css" />
        <link rel="stylesheet" href="todo.css" />
        <title>سديد | قائمة المهام</title>
    </head>
    <body>
        <!-- Start Header -->
        <header>
            <div class="container">
                <div class="logo">
                    سديد
                </div>
                <div class="setting">
                    <i class="fa-solid fa-gear"></i>
                </div>
            </div>
        </header>
        <!-- End Header -->
        <!-- Start Welcome -->
        <div class="welcome">
            <div class="container">
                <div>
                    <div class="avatar">
                        <img src="../img/cute-green-check-mark-icon.svg" />
                    </div>
                    <h1>قائمة المهام</h1>
                </div>
                <p>إذا كنت تواجه  أثناء يومك أنك تنسى بعض المهام، وبعضها قد يكون مهما، قائمة المهام تستطيع بها كتابة مهامهك اليومية وترتيبها ووضع علامة عند الإنتهاء من أي مهمة</p>
            </div>
        </div>
        <!-- End Welcome -->
        <!-- Start ToDo -->
        <div class="todo">
            <div class="container">
                <form action="">
                    <input type="text" placeholder="ماهي مهمتك" />
                    <button>أضف <i class="fa-solid fa-plus"></i></button>
                </form>
                <div class="todo-section"></div>
            </div>
        </div>
        <!-- End ToDo -->
        <script src="todo.js"></script>
    </body>
</html>
